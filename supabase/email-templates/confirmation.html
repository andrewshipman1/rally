<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0; padding:0; background:#f5f1ea; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color:#1a2a33;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f1ea; padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px; background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.08);">
          <tr>
            <td style="height:80px; background:linear-gradient(135deg,#1a3d4a,#2d6b5a,#3a8a7a); text-align:center; vertical-align:middle;">
              <span style="font-family: Georgia, 'Times New Roman', serif; font-size:28px; color:#fff; font-weight:800; letter-spacing:0.5px;">rally!</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 36px;">
              <h1 style="font-family: Georgia, 'Times New Roman', serif; font-size:26px; line-height:1.2; margin:0 0 16px; color:#122c35; font-weight:800;">
                confirm your email
              </h1>
              <p style="font-size:15px; line-height:1.6; color:#2a3a43; margin:0 0 28px;">
                Tap below to confirm your email and finish setting up your Rally account.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 8px;">
                <tr>
                  <td align="center" style="background:#122c35; border-radius:12px;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block; padding:16px 36px; color:#fff; text-decoration:none; font-weight:700; font-size:15px; letter-spacing:0.2px;">
                      Confirm email
                    </a>
                  </td>
                </tr>
              </table>
              <p style="font-size:11px; color:#98a5ab; text-align:center; margin:24px 0 0;">
                If you didn't create an account, just ignore this.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 36px; border-top:1px solid #f0ece4; text-align:center;">
              <div style="font-family: Georgia, serif; font-size:12px; color:#98a5ab;">
                Made with <strong style="color:#556b73;">Rally</strong> — the group trip planner
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
